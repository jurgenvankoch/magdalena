<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>wieder eine kurze Frage ☕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;
      --muted:#7d8590;--green:#3fb950;--green-dim:#1a3a1f;
      --red:#f85149;--red-dim:#3a1010;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:2rem 1rem;overflow:hidden;}

    .card{background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:3rem 2.5rem;text-align:center;
      max-width:420px;width:100%;}

    .emoji{font-size:4rem;display:block;margin-bottom:1.2rem;
      animation:steam 2s ease-in-out infinite;}
    @keyframes steam{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

    h1{font-size:1.3rem;font-weight:700;margin-bottom:.5rem;line-height:1.4;}
    .sub{font-size:.85rem;color:var(--muted);margin-bottom:2.5rem;line-height:1.6;}

    .btn-area{display:flex;align-items:center;justify-content:center;gap:16px;}

    .btn-yes{font-family:'Inter',sans-serif;font-size:1rem;font-weight:600;
      padding:.75rem 2.2rem;border-radius:10px;border:1px solid #238636;
      background:var(--green-dim);color:var(--green);cursor:pointer;
      transition:background .15s;}
    .btn-yes:hover{background:#1f4a26;}

    /* nein: static by default, switches to fixed when moving starts */
    .btn-no{font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;
      padding:.75rem 1.8rem;border-radius:10px;border:1px solid var(--red);
      background:var(--red-dim);color:var(--red);cursor:pointer;
      white-space:nowrap;}

    #yes-screen{display:none;text-align:center;}
    .yes-emoji{font-size:4rem;display:block;margin-bottom:1rem;
      animation:pop .4s cubic-bezier(.36,.07,.19,.97);}
    @keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
    .yes-title{font-size:1.3rem;font-weight:700;margin-bottom:.5rem;}
    .yes-sub{font-size:.85rem;color:var(--muted);line-height:1.6;}

    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .fade{animation:fadeIn .4s ease both;}
  </style>
</head>
<body>

  <div id="ask-screen" class="card fade">
    <span class="emoji">☕</span>
    <h1>Magst du mal einen Kaffee mit mir trinken gehen?</h1>
    <div class="sub">ganz unverbindlich natürlich 🙂</div>
    <div class="btn-area">
      <button class="btn-yes" onclick="sayYes()">Ja, gerne! ☕</button>
      <button class="btn-no" id="nein-btn">Nein</button>
    </div>
  </div>

  <div id="yes-screen" class="fade">
    <div class="card">
      <span class="yes-emoji">🎉</span>
      <div class="yes-title">perfekt 🙂</div>
      <div class="yes-sub">ich freu mich schon<br>wann passt es dir?</div>
    </div>
  </div>

<script>
  const btn = document.getElementById('nein-btn');
  let animFrame = null;
  let moveCount = 0;
  let moving = false;
  const neinTexts = ['Nein','Nein...','Bitte nicht 😅','Neeein','wirklich nein','hmm nein','nope','na gut... nein'];

  function startMoving() {
    if (moving) return;
    moving = true;
    const rect = btn.getBoundingClientRect();
    btn.style.position = 'fixed';
    btn.style.left = rect.left + 'px';
    btn.style.top  = rect.top  + 'px';
    btn.style.margin = '0';
    document.body.appendChild(btn);
    jumpAround();
  }

  function jumpAround() {
    cancelAnimationFrame(animFrame);
    const bw = btn.offsetWidth;
    const bh = btn.offsetHeight;
    // stay near the card — use card center as anchor
    const card = document.getElementById('ask-screen');
    const cr = card.getBoundingClientRect();
    const cx = cr.left + cr.width / 2;
    const cy = cr.top  + cr.height / 2;
    // random spot within ~120px around the card edges
    const angle = Math.random() * Math.PI * 2;
    const dist  = cr.width / 2 + 20 + Math.random() * 80;
    const baseX = Math.max(8, Math.min(window.innerWidth  - bw - 8, cx + Math.cos(angle) * dist - bw / 2));
    const baseY = Math.max(8, Math.min(window.innerHeight - bh - 8, cy + Math.sin(angle) * dist - bh / 2));
    let t = Math.random() * Math.PI * 2;

    function animate() {
      t += 0.03;
      const nx = Math.max(8, Math.min(window.innerWidth  - bw - 8, baseX + Math.sin(t * 0.9) * 10));
      const ny = Math.max(8, Math.min(window.innerHeight - bh - 8, baseY + Math.cos(t * 1.1) * 7));
      btn.style.left = nx + 'px';
      btn.style.top  = ny + 'px';
      animFrame = requestAnimationFrame(animate);
    }
    animate();
  }

  function onHover() {
    if (!moving) { startMoving(); return; }
    moveCount++;
    btn.textContent = neinTexts[Math.min(moveCount, neinTexts.length - 1)];
    jumpAround();
  }

  function sayYes() {
    cancelAnimationFrame(animFrame);
    btn.style.display = 'none';
    document.getElementById('ask-screen').style.display = 'none';
    const ys = document.getElementById('yes-screen');
    ys.style.display = 'block';
    ys.classList.remove('fade');
    void ys.offsetWidth;
    ys.classList.add('fade');
  }

  btn.addEventListener('mouseenter', onHover);
  btn.addEventListener('touchstart', onHover);
  btn.addEventListener('click', onHover);
</script>
</body>
</html>
